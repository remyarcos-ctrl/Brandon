<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandon — Agent SEO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f8fc; height: 100vh; display: flex; flex-direction: column; }
.top { background: #fff; border-bottom: 1.5px solid #e8eaf6; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-av { width: 38px; height: 38px; background: #5c6bc0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
.logo-sub { font-size: 11px; color: #7986cb; margin-top: 1px; }
.online { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #43a047; font-weight: 500; background: #f1f8e9; border: 1.5px solid #c5e1a5; padding: 4px 12px; border-radius: 20px; }
.online-dot { width: 7px; height: 7px; background: #66bb6a; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.msgs { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
.msg { display: flex; gap: 10px; animation: fadein 0.3s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.av { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-top: 2px; }
.av-s { background: #e8eaf6; }
.av-u { background: #e3f2fd; }
.msg-col { display: flex; flex-direction: column; gap: 4px; max-width: 76%; }
.msg-name { font-size: 11px; font-weight: 500; color: #aab0c4; padding: 0 4px; }
.msg.user .msg-name { text-align: right; }
.bubble { padding: 12px 16px; font-size: 13.5px; line-height: 1.7; color: #2d3047; }
.bubble-s { background: #fff; border: 1.5px solid #e8eaf6; border-radius: 4px 18px 18px 18px; min-height: 44px; }
.bubble-u { background: #5c6bc0; color: #fff; border-radius: 18px 4px 18px 18px; }
.tools-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 4px; }
.tool-tag { background: #fff8e1; border: 1.5px solid #ffe082; color: #f57f17; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.qa-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.qa { background: #f0f2ff; border: 1.5px solid #c5cae9; border-radius: 20px; font-size: 12px; font-weight: 500; color: #5c6bc0; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
.qa:hover { background: #e8eaf6; }
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.t-dot { width: 7px; height: 7px; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.t-dot:nth-child(1) { background: #c5cae9; }
.t-dot:nth-child(2) { background: #9fa8da; animation-delay: 0.2s; }
.t-dot:nth-child(3) { background: #7986cb; animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.inp-area { background: #fff; border-top: 1.5px solid #e8eaf6; padding: 14px 24px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.inp-box { flex: 1; background: #f7f8fc; border: 1.5px solid #e8eaf6; border-radius: 24px; padding: 11px 18px; font-size: 13.5px; color: #2d3047; outline: none; font-family: inherit; transition: border-color 0.15s; }
.inp-box:focus { border-color: #9fa8da; background: #fff; }
.inp-box::placeholder { color: #c5cae9; }
.send { width: 40px; height: 40px; background: #5c6bc0; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
.send:hover { background: #3949ab; transform: translateY(-1px); }
.send:disabled { background: #c5cae9; cursor: not-allowed; transform: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #e8eaf6; border-radius: 2px; }
</style>
</head>
<body>

<div class="top">
  <div class="logo">
    <div class="logo-av">🚀</div>
    <div>
      <div class="logo-name">Brandon</div>
      <div class="logo-sub">Votre agent SEO personnel</div>
    </div>
  </div>
  <div class="online"><div class="online-dot"></div>En ligne</div>
</div>

<div class="msgs" id="msgs"></div>

<div class="inp-area">
  <input class="inp-box" id="inp" type="text" placeholder="Posez votre question à Brandon..." />
  <button class="send" id="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
const BACKEND = 'https://seomax-production.up.railway.app';
let isLoading = false;

function scrollBottom() {
  var msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

function createMsgEl(role) {
  var msgs = document.getElementById('msgs');
  var div = document.createElement('div');
  div.className = 'msg' + (role === 'user' ? ' user' : '');
  var av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'av-u' : 'av-s');
  av.textContent = role === 'user' ? '👤' : '🚀';
  var col = document.createElement('div');
  col.className = 'msg-col';
  var name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role === 'user' ? 'Vous' : 'Brandon';
  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'bubble-u' : 'bubble-s');
  col.appendChild(name);
  col.appendChild(bubble);
  div.appendChild(av);
  div.appendChild(col);
  msgs.appendChild(div);
  scrollBottom();
  return bubble;
}

function showTyping() {
  var bubble = createMsgEl('agent');
  bubble.id = 'typing-bubble';
  bubble.innerHTML = '<div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';
  return bubble;
}

function hideTyping() {
  var el = document.getElementById('typing-bubble');
  if (el) {
    el.id = '';
    el.innerHTML = '';
  }
  return el;
}

function fmt(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<div style="font-weight:600;color:#5c6bc0;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-weight:700;color:#3949ab;margin:10px 0 6px;font-size:14px">$1</div>')
    .replace(/^[-•] (.+)$/gm, '<div style="padding:2px 0 2px 12px">› $1</div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addQuickActions(bubble, actions) {
  var row = document.createElement('div');
  row.className = 'qa-row';
  actions.forEach(function(a) {
    var btn = document.createElement('div');
    btn.className = 'qa';
    btn.textContent = a;
    btn.onclick = function() {
      document.getElementById('inp').value = a;
      sendMessage();
    };
    row.appendChild(btn);
  });
  bubble.appendChild(row);
}

async function sendMessage() {
  if (isLoading) return;
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  var userBubble = createMsgEl('user');
  userBubble.textContent = text;

  var agentBubble = showTyping();
  var fullText = '';
  var toolsRow = null;
  var started = false;

  try {
    var resp = await fetch(BACKEND + '/audit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: text, email: '', keyword: ''})
    });

    var reader = resp.body.getReader();
    var dec = new TextDecoder();

    while (true) {
      var res = await reader.read();
      if (res.done) break;
      var chunk = dec.decode(res.value);
      var lines = chunk.split('\n');

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data:')) continue;
        try {
          var d = JSON.parse(line.slice(5).trim());

          if (d.type === 'message' && d.content) {
            if (!started) {
              agentBubble.innerHTML = '';
              started = true;
            }
            fullText += d.content + '\n';
            if (toolsRow) {
              agentBubble.innerHTML = '';
              agentBubble.appendChild(toolsRow);
            }
            var textDiv = document.createElement('div');
            textDiv.innerHTML = fmt(fullText);
            agentBubble.appendChild(textDiv);
            scrollBottom();
          }

          else if (d.type === 'tool') {
            if (!toolsRow) {
              toolsRow = document.createElement('div');
              toolsRow.className = 'tools-row';
              agentBubble.innerHTML = '';
              agentBubble.appendChild(toolsRow);
            }
            var tag = document.createElement('span');
            tag.className = 'tool-tag';
            tag.textContent = '⚡ ' + d.content.replace('Utilisation de : ', '');
            toolsRow.appendChild(tag);
            scrollBottom();
          }

          else if (d.type === 'done') {
            addQuickActions(agentBubble, ['📋 Plan d\'action', '📧 Recevoir par email', '🏆 Concurrents']);
          }

        } catch(e) {}
      }
    }

    if (!started) {
      agentBubble.innerHTML = 'Je suis là ! Posez-moi une question SEO ou donnez-moi une URL à analyser.';
    }

  } catch(e) {
    agentBubble.innerHTML = 'Oups, une erreur est survenue 😕 Réessayez dans un instant !';
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});

window.onload = function() {
  var bubble = createMsgEl('agent');
  bubble.innerHTML = '👋 Salut ! Je suis <strong>Brandon</strong>, votre agent SEO personnel.<br><br>Donnez-moi une URL à analyser, posez-moi une question SEO, ou dites-moi quel mot-clé vous souhaitez cibler — je m\'occupe du reste !';
  addQuickActions(bubble, ['🔍 Auditer mon site', '🎯 Analyser un mot-clé', '🏆 Voir mes concurrents']);
};
</script>
</body>
</html>
